

services:
  postgres:
    image: postgres:16
    container_name: qeasyapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qeasyapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # автоматически применит миграции при первом запуске

volumes:
  postgres_data: